<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HITL Governance</title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #0b0d13; color: #e5e7eb; }
    header { background: #111827; padding: 14px 20px; border-bottom: 1px solid #1f2937; }
    h1 { margin: 0; font-size: 18px; color: #93c5fd; }
    main { padding: 20px; max-width: 900px; margin: 0 auto; }
    p { line-height: 1.6; color: #cbd5e1; }
    code { background: #111827; padding: 2px 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>HITL Governance</h1>
  </header>
  <main>
    <p>Human-in-the-loop approval (<code>ApprovePattern</code>) promotes ephemeral patterns into persisted capabilities.
       It provides a clear gate for safety, quality, and intent alignment.</p>
    <h3>Signals</h3>
    <ul>
      <li>Approval events in the branch history</li>
      <li>Autodoc shows <code>persisted: true</code> for approved endpoints</li>
    </ul>
  </main>
</body>
</html>
