name: meta2_ci_loop
version: 0.1.0
description: Run the Meta2 CI loop and mirror results into Meta3Vault receipts.
intent: "Execute daily CI with deterministic and Codex telemetry, publishing receipts to both engine memory and vault."
scope: governance
system_layer: governance
source_refs:
  - Meta3Vault/Meta2 CI Loop.md:1
  - Meta3Vault/Receipts Index.md:1
preconditions:
  - type: service_ready
    endpoint: http://127.0.0.1:7777/healthz
  - type: binary_exists
    path: ./scripts/governance_check.sh
  - type: directory_exists
    path: logs/
triggers:
  - type: timer
    schedule: cron@daily@02:00
  - type: webhook
    route: /telemetry/run
inputs:
  - type: dataset
    path: Meta3Vault/Receipts Index.md
  - type: utir_template
    path: utir/ci_loop.utir
actions:
  - type: utir
    label: run_ci_utir
    utir_template: utir/ci_loop.utir
    expected_receipts:
      - logs/governance/{{ run_id }}/utir.log
  - type: shell
    label: governance_script
    command: "./scripts/governance_check.sh --canon meta2_ci_loop"
    working_dir: .
    expected_receipts:
      - logs/governance/{{ run_id }}/report.md
  - type: api_call
    label: telemetry_sync
    endpoint: /telemetry/run
    method: POST
    payload:
      label_prefix: meta2-ci
      deterministic: true
      codex: true
    expected_receipts:
      - logs/governance/{{ run_id }}/telemetry.json
postconditions:
  - type: receipt_written
    path: Meta3Vault/Receipts/ci/{{ run_id }}.md
  - type: report_exists
    path: logs/governance/{{ run_id }}/report.md
  - type: status_bit
    bit: A
    value: 1
failure_modes:
  - detection: telemetry endpoint failure
    recovery: retry telemetry_sync action with backoff.
  - detection: governance_check exit code non-zero
    recovery: inspect logs/governance/{{ run_id }}/report.md and rerun with --redo.
receipts:
  engine_memory: memory/ledger.jsonl
  vault_mirror: Meta3Vault/Receipts/ci
ablation_knob:
  flag: META_CANON_CI_LOOP_DISABLED
  expected_effect: stop CI loop scheduling while keeping manual runs available.
upstream_dependencies:
  - meta2_orchestrator_boot
downstream_consumers:
  - meta3_receipts_rollup
audit_notes:
  - Ensure deterministic suites run inside sandboxed environment.
  - Confirm webhook trigger is authenticated before enabling.
last_review: 2024-10-23T00:00:00Z
