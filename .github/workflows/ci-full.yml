name: CI Full

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Lint, build, and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all --locked

      - name: Unit tests
        run: cargo test --all --locked -- --nocapture

  integration:
    name: Smoke + governance checks
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Start engine
        run: |
          cargo run -- --port 7777 --host 127.0.0.1 --memory-path ./memory --allowed-domains "httpbin.org,api.github.com,jsonplaceholder.typicode.com" &
          for i in {1..60}; do
            if curl -s http://127.0.0.1:7777/healthz >/dev/null; then
              echo "Engine is healthy"; break; fi
            sleep 0.5
          done
          curl -sSf http://127.0.0.1:7777/healthz >/dev/null

      - name: Smoke tests (test_consciousness.sh)
        run: bash ./test_consciousness.sh

      - name: Governance checks
        run: bash ./scripts/governance_check.sh || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: one-engine-logs-and-conversation
          if-no-files-found: ignore
          path: |
            logs/**/*
            conversation.md
            out_one_engine/**/*
