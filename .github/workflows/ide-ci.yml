name: IDE CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root deps (for docs build)
        run: npm ci

      - name: Build docs (Eleventy)
        run: npm run build-docs

      - name: Install IDE deps
        run: npm install --prefix apps/ide

      - name: Build IDE (Next.js)
        env:
          NEXT_PUBLIC_ENGINE_BASE_URL: http://127.0.0.1:8000
        run: npm run build --prefix apps/ide
