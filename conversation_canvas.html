<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fractal Conversation Canvas</title>
  <style>
    body {
      margin: 0;
      font-family: 'SF Pro', Helvetica, sans-serif;
      background: #0b0d13;
      color: #f1f5f9;
    }
    header {
      background: linear-gradient(90deg, #111827, #1f2937);
      padding: 1.2rem 2rem;
      border-bottom: 1px solid #1f2937;
    }
    header h1 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #38bdf8;
    }
    .container {
      display: flex;
      gap: 1rem;
      padding: 1rem 2rem 2rem;
      height: calc(100vh - 72px);
      box-sizing: border-box;
    }
    .column {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 12px;
      backdrop-filter: blur(18px);
      overflow: hidden;
    }
    .column h2 {
      margin: 0;
      padding: 0.85rem 1.1rem;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      background: rgba(15, 23, 42, 0.95);
    }
    .column pre, .column .content {
      flex: 1;
      margin: 0;
      padding: 1rem;
      overflow-y: auto;
      line-height: 1.5;
    }
    pre {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.85rem;
      background: rgba(15, 23, 42, 0.35);
      border-radius: 8px;
      padding: 0.75rem;
      border: 1px solid rgba(148, 163, 184, 0.1);
      white-space: pre-wrap;
      word-break: break-word;
    }
    a {
      color: #38bdf8;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>Fractal Intelligence — Conversation Canvas</h1>
  </header>
  <div class="container">
    <div class="column" id="prompts">
      <h2>Prompts</h2>
      <div class="content"></div>
    </div>
    <div class="column" id="responses">
      <h2>Engine Effects</h2>
      <div class="content"></div>
    </div>
    <div class="column" id="receipts">
      <h2>Receipts</h2>
      <div class="content"></div>
    </div>
  </div>
  <script>
    const prompts = document.querySelector('#prompts .content');
    const responses = document.querySelector('#responses .content');
    const receipts = document.querySelector('#receipts .content');

    function appendBlock(target, title, body) {
      const h = document.createElement('h3');
      h.textContent = title;
      const pre = document.createElement('pre');
      pre.textContent = body;
      target.appendChild(h);
      target.appendChild(pre);
      target.scrollTop = target.scrollHeight;
    }

    async function loadConversation() {
      try {
        const response = await fetch('conversation.md');
        if (!response.ok) return;
        const text = await response.text();
        const sections = text.split(/(^###\s.*$)/m).slice(1);
        prompts.innerHTML = '';
        responses.innerHTML = '';
        receipts.innerHTML = '';
        for (let i = 0; i < sections.length; i += 2) {
          const title = sections[i];
          const body = sections[i + 1];
          if (!body) continue;
          const prompt = body.match(/#### Prompt\n```([\s\S]*?)```/);
          const response = body.match(/#### Engine Response\n```([\s\S]*?)```/);
          const receipt = body.match(/#### Receipts\n```([\s\S]*?)```/);
          appendBlock(prompts, title.trim(), prompt ? prompt[1].trim() : '');
          appendBlock(responses, title.trim(), response ? response[1].trim() : '');
          appendBlock(receipts, title.trim(), receipt ? receipt[1].trim() : '');
        }
      } catch (err) {
        console.error('loadConversation failed', err);
      }
    }

    function connectSSE() {
      const params = new URLSearchParams(window.location.search);
      const engineUrl = (params.get('engine') || 'http://127.0.0.1:8080').replace(/\/$/, '');
      const runId = params.get('run_id') || params.get('runId') || '';
      const url = engineUrl + '/progress.sse' + (runId ? '?run_id=' + encodeURIComponent(runId) : '');
      appendBlock(responses, 'SSE', `Connecting to ${url}`);
      let es;
      try {
        es = new EventSource(url);
      } catch (err) {
        appendBlock(responses, 'SSE', 'EventSource failed to start: ' + err.message);
        return;
      }
      es.onmessage = (evt) => {
        try {
          const data = JSON.parse(evt.data);
          const ts = new Date().toISOString();
          const phase = data.phase || data.status || 'event';
          appendBlock(responses, `${ts} • ${phase}`, JSON.stringify(data, null, 2));
          if (data.receipt || data.receipt_path || data.output_path) {
            const r = data.receipt || data.receipt_path || data.output_path;
            appendBlock(receipts, `${ts} • receipt`, r);
          }
          if (data.request || data.prompt) {
            appendBlock(prompts, `${ts} • prompt`, JSON.stringify(data.request || data.prompt, null, 2));
          }
        } catch (err) {
          appendBlock(responses, 'SSE parse error', evt.data);
        }
      };
      es.onerror = () => {
        appendBlock(responses, 'SSE', 'Error/closed — check engine availability.');
      };
    }

    // Load existing transcript, then stream live.
    loadConversation().then(connectSSE);
  </script>
</body>
</html>
